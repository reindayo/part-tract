<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — PartTrack</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <style>
    * { font-family: 'Inter', sans-serif; }
    .login-bg {
      background: linear-gradient(135deg, #1F6F5F 0%, #2FA084 50%, #6FCF97 100%);
      min-height: 100vh;
    }
    .login-card {
      animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .input-field {
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: #2FA084;
      box-shadow: 0 0 0 3px rgba(47,160,132,0.15);
    }
  </style>
</head>
<body class="login-bg flex items-center justify-center p-4">

  <!-- Decorative blobs -->
  <div class="absolute top-0 left-0 w-72 h-72 rounded-full opacity-20" style="background:radial-gradient(circle,#fff,transparent);transform:translate(-50%,-50%)"></div>
  <div class="absolute bottom-0 right-0 w-96 h-96 rounded-full opacity-10" style="background:radial-gradient(circle,#fff,transparent);transform:translate(30%,30%)"></div>

  <div class="login-card relative z-10 bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
    <!-- Header -->
    <div class="px-8 pt-8 pb-6 text-center" style="background: linear-gradient(135deg, #1F6F5F, #2FA084)">
      <div class="w-16 h-16 rounded-2xl bg-white/20 flex items-center justify-center mx-auto mb-4">
        <i class="fas fa-microchip text-white text-2xl"></i>
      </div>
      <h1 class="text-white text-2xl font-bold">PartTrack</h1>
      <p class="text-white/70 text-sm mt-1">Computer Parts Inventory System</p>
    </div>

    <!-- Form -->
    <div class="px-8 py-8">
      <h2 class="text-gray-800 text-xl font-semibold mb-6">Welcome back</h2>

      {% if form.errors %}
        <div class="mb-4 p-3 bg-red-50 border border-red-200 rounded-lg flex items-center gap-2">
          <i class="fas fa-circle-exclamation text-red-500 text-sm"></i>
          <p class="text-red-600 text-sm">Invalid username or password.</p>
        </div>
      {% endif %}

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
          <div class="relative">
            <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" name="username" required autocomplete="username"
              class="input-field w-full pl-10 pr-4 py-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50"
              placeholder="Enter your username"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
          <div class="relative">
            <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="password" name="password" id="pwdField" required autocomplete="current-password"
              class="input-field w-full pl-10 pr-10 py-2.5 border border-gray-200 rounded-xl text-sm bg-gray-50"
              placeholder="Enter your password"/>
            <button type="button" onclick="togglePwd()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <i class="fas fa-eye text-sm" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <input type="hidden" name="next" value="{{ next }}"/>
        <button type="submit" class="w-full py-2.5 rounded-xl text-white font-semibold text-sm transition hover:opacity-90 active:scale-[0.98] mt-2"
          style="background: linear-gradient(135deg, #1F6F5F, #2FA084)">
          <i class="fas fa-sign-in-alt mr-2"></i>Sign In
        </button>
      </form>
    </div>

    <div class="px-8 pb-6 text-center">
      <p class="text-xs text-gray-400">PartTrack &copy; 2024 &mdash; Inventory Management</p>
    </div>
  </div>

  <script>
    function togglePwd() {
      const f = document.getElementById('pwdField');
      const i = document.getElementById('eyeIcon');
      if (f.type === 'password') { f.type = 'text'; i.className = 'fas fa-eye-slash text-sm'; }
      else { f.type = 'password'; i.className = 'fas fa-eye text-sm'; }
    }
  </script>
</body>
</html>
